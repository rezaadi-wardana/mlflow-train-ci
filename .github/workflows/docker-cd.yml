name: CI/CD MLflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: "MLproject/train_pca.csv"
  TARGET_VAR: "Credit_Score"
  MLFLOW_TRACKING_URI: sqlite:///${{ github.workspace }}/mlflow.db

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==3.11.1 scikit-learn pandas numpy

      - name: Run MLflow project
        run: |
          mlflow run MLproject --env-manager=local --experiment-name "Latihan Credit Scoring"

      - name: Get latest run ID
        run: |
          RUN_ID=$(python -c "
          import sqlite3, os
          db_path = os.path.expanduser('${{ github.workspace }}/mlflow.db')
          conn = sqlite3.connect(db_path)
          c = conn.cursor()
          c.execute(\"SELECT run_uuid FROM runs WHERE experiment_id=1 ORDER BY start_time DESC LIMIT 1\")
          row = c.fetchone()
          conn.close()
          print(row[0] if row else '')
          ")
                  if [ -z "$RUN_ID" ]; then
            echo "Error: No run found in experiment 1"
            exit 1
          fi
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

      - name: Build Docker model
        run: |
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "cc"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and push Docker image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest