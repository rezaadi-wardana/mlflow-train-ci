name: CI/CD MLflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: "MLproject/train_pca.csv"
  TARGET_VAR: "Credit_Score"
  # Gunakan database SQLite yang persisten selama job
  MLFLOW_TRACKING_URI: sqlite:///${{ github.workspace }}/mlflow.db

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==3.11.1 scikit-learn pandas numpy

      # ❌ HAPUS langkah Clean previous mlflow data
      # - name: Clean previous mlflow data
      #   run: |
      #     rm -f mlflow.db
      #     rm -rf mlruns

      - name: Run MLflow project
        run: |
          mlflow run MLproject --env-manager=local --experiment-name "Latihan Credit Scoring"

      - name: Get latest run ID
        run: |
          # Tracking URI sudah diatur oleh env global, tidak perlu di-export ulang
          RUN_ID=$(mlflow runs list \
            --experiment-name "Latihan Credit Scoring" \
            --order-by start_time DESC \
            --limit 1 \
            --output table \
            | tail -n 1 \
            | awk '{print $1}')
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

      - name: Build Docker model
        run: |
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "cc"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and push Docker image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest