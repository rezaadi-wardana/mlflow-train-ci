name: CD

on:
  workflow_run:
    workflows: ["CI"]      # Nama workflow CI
    types:
      - completed

env:
  MLFLOW_TRACKING_URI: sqlite:///${{ github.workspace }}/mlflow.db

jobs:
  build-docker:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      - name: Install MLflow
        run: pip install mlflow==3.11.1
      - uses: actions/download-artifact@v3
        with:
          name: run-id
      - name: Set RUN_ID
        run: echo "RUN_ID=$(cat run_id.txt)" >> $GITHUB_ENV
      - name: Build Docker model
        run: mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "cc"
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      - name: Push image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest